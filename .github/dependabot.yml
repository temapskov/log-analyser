# =============================================================================
#  Dependabot: Go modules + Docker base images + GitHub Actions
#  Weekly, группировка minor+patch. См. docs/plans/12-devops.md §8.
# =============================================================================
version: 2

updates:
  # --- Go modules -----------------------------------------------------------
  - package-ecosystem: "gomod"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "07:00"
      timezone: "Europe/Moscow"
    open-pull-requests-limit: 10
    labels:
      - "chore"
      - "deps"
      - "go"
    commit-message:
      prefix: "chore(deps)"
      include: "scope"
    reviewers:
      - "temapskov"
    groups:
      go-minor-patch:
        applies-to: version-updates
        update-types:
          - "minor"
          - "patch"
      go-security:
        applies-to: security-updates
        update-types:
          - "patch"
          - "minor"
          - "major"

  # --- Dockerfile base images -----------------------------------------------
  - package-ecosystem: "docker"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "07:00"
      timezone: "Europe/Moscow"
    open-pull-requests-limit: 5
    labels:
      - "chore"
      - "deps"
      - "docker"
    commit-message:
      prefix: "chore(deps)"
      include: "scope"
    reviewers:
      - "temapskov"

  # --- GitHub Actions --------------------------------------------------------
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "07:00"
      timezone: "Europe/Moscow"
    open-pull-requests-limit: 5
    labels:
      - "chore"
      - "deps"
      - "ci"
    commit-message:
      prefix: "chore(deps)"
      include: "scope"
    reviewers:
      - "temapskov"
    groups:
      actions-minor-patch:
        applies-to: version-updates
        update-types:
          - "minor"
          - "patch"
