# =============================================================================
#  Release: goreleaser на тегах v*.*.*
#  Публикация: GitHub Release + Docker в GHCR + SBOM + cosign keyless.
#  См. docs/plans/12-devops.md §6.2 и §7.
# =============================================================================
name: release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write     # GitHub Release
  packages: write     # GHCR push
  id-token: write     # OIDC для cosign keyless
  attestations: write # build provenance

jobs:
  goreleaser:
    name: goreleaser
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # все теги нужны для changelog

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.25"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Install Syft (SBOM)
        uses: anchore/sbom-action/download-syft@v0.24.0

      - name: Install Cosign
        uses: sigstore/cosign-installer@v3
        with:
          cosign-release: "v2.4.0"

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v6
        with:
          distribution: goreleaser
          version: "~> v2"
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          COSIGN_EXPERIMENTAL: "1"

      - name: Attest build provenance for archives
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: "dist/*.tar.gz"
