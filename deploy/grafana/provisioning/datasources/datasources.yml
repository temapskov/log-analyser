# Grafana datasource provisioning — dev-окружение.
# Меняй URL'ы, если VL крутится не в compose, а снаружи.
apiVersion: 1

datasources:
  - name: VictoriaLogs
    type: victoriametrics-logs-datasource
    uid: vl-local-dev
    access: proxy
    url: http://victorialogs:9428
    isDefault: true
    editable: true
    jsonData:
      timeout: 60

  - name: Prometheus
    type: prometheus
    uid: prom-local-dev
    access: proxy
    url: http://prometheus:9090
    editable: true
