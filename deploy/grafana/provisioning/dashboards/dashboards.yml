# Grafana dashboard provisioning — пустой манифест, дашборды появятся в SRE-плане.
apiVersion: 1

providers:
  - name: "log_analyser"
    orgId: 1
    folder: "log_analyser"
    type: file
    disableDeletion: false
    editable: true
    updateIntervalSeconds: 30
    options:
      path: /etc/grafana/provisioning/dashboards
      foldersFromFilesStructure: true
