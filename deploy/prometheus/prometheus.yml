# Prometheus config для локальной разработки log_analyser.
# См. docs/plans/12-devops.md §5.
global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    env: dev
    service: log_analyser

scrape_configs:
  - job_name: "log-analyser"
    metrics_path: "/metrics"
    static_configs:
      - targets: ["log-analyser:9090"]
        labels:
          instance: "log-analyser-dev"

  - job_name: "prometheus-self"
    static_configs:
      - targets: ["localhost:9090"]
